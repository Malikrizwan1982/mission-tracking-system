<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UN Field Terminal - Simulation Mode</title>
    <style>
        :root {
            --bg: #0a0a0a; --surface: #161616; --primary: #bb86fc;
            --danger: #ff4d4d; --success: #00e676; --text: #ffffff;
            --border: #2c2c2c;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .terminal { width: 90%; max-width: 400px; background: var(--surface); padding: 40px; border-radius: 25px; border: 1px solid var(--border); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        h1 { font-size: 1.1rem; letter-spacing: 4px; color: var(--primary); text-transform: uppercase; margin-bottom: 30px; }
        
        .input-group { text-align: left; margin-bottom: 30px; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; }
        input { width: 100%; padding: 18px; background: #222; border: 2px solid var(--border); border-radius: 12px; color: white; font-size: 1.2rem; text-align: center; outline: none; }
        input:focus { border-color: var(--primary); }

        .sos-btn {
            width: 160px; height: 160px; border-radius: 50%; border: none;
            background: var(--danger); color: white; font-size: 2rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 0 30px rgba(255, 77, 77, 0.4);
            margin: 20px 0; transition: transform 0.1s;
        }
        .sos-btn:active { transform: scale(0.9); }

        .update-btn { width: 100%; padding: 15px; background: var(--success); color: #00331a; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        #console { margin-top: 25px; min-height: 50px; font-weight: bold; border-radius: 8px; display: flex; align-items: center; justify-content: center; visibility: hidden; }
        .visible { visibility: visible !important; }
    </style>
</head>
<body>

    <div class="terminal">
        <h1>UN Field Unit</h1>
        <div class="input-group">
            <label>Callsign</label>
            <input list="missions" id="callsign" placeholder="SEARCH ID..." onfocus="this.value=''">
            <datalist id="missions"></datalist>
        </div>

        <button class="sos-btn" onclick="sendSignal('SOS')">SOS</button>
        <button class="update-btn" onclick="sendSignal('Active')">Location Update</button>

        <div id="console">READY</div>
    </div>

    <script>
        const API = 'http://127.0.0.1:5000/api/missions';

        window.onload = async () => {
            const res = await fetch(API + '/');
            const data = await res.json();
            document.getElementById('missions').innerHTML = data.map(m => `<option value="${m.callsign}">`).join('');
        };

        async function sendSignal(statusType) {
            const callsign = document.getElementById('callsign').value.trim().toUpperCase();
            if (!callsign) return showMsg("ID REQUIRED", "#ff4d4d");

            showMsg("TRANSMITTING...", "#bb86fc");

            try {
                // 1. Get current data for this mission so we DON'T overwrite the location with local GPS
                const checkRes = await fetch(API + '/');
                const allMissions = await checkRes.json();
                const mission = allMissions.find(m => m.callsign === callsign);

                // 2. Use existing map coords if they exist, otherwise fallback to 0,0
                const payload = {
                    callsign: callsign,
                    status: statusType,
                    lat: mission ? mission.lat : 0,
                    lng: mission ? mission.lng : 0
                };

                const res = await fetch(API + '/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    showMsg("TRANSMITTED", "#00e676", true);
                }
            } catch (e) {
                showMsg("SERVER OFFLINE", "#ff4d4d");
            }
        }

        function showMsg(txt, col, hide) {
            const el = document.getElementById('console');
            el.innerText = txt; el.style.color = col; el.classList.add('visible');
            if (hide) setTimeout(() => el.classList.remove('visible'), 3000);
        }
    </script>
</body>
</html>
