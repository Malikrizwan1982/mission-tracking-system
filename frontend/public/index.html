<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MTS - Pakistan Mission Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #38bdf8; 
            --sos: #ef4444; 
            --moving: #22c55e;
            --text: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        /* Left Side: Full Height Map */
        #map { 
            flex: 1.5; 
            height: 100%; 
            border-right: 2px solid #334155; 
            z-index: 1;
        }

        /* Right Side: Dashboard Layout */
        .dashboard-side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: var(--bg);
        }

        .header-panel { 
            padding: 20px; 
            background: var(--card); 
            border-bottom: 1px solid #334155; 
            flex-shrink: 0;
        }

        /* Mission Cards Area (Approx 80%) */
        .scroll-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
        }

        /* Incident Feed (Approx 20%) */
        .log-section { 
            height: 20vh; 
            background: #020617; 
            border-top: 2px solid #334155;
            padding: 15px; 
            overflow-y: auto;
            flex-shrink: 0;
        }

        .controls { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
        }

        select, button { 
            padding: 10px 15px; 
            border-radius: 6px; 
            border: 1px solid #475569; 
            background: var(--bg); 
            color: white; 
            font-weight: 600; 
            cursor: pointer; 
        }

        button:hover { background: #334155; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 15px; 
        }

        /* CARD STYLES */
        .card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 12px; 
            border-left: 6px solid #64748b; 
            transition: all 0.3s ease;
        }

        /* Moving State (Active + Location) */
        .card.Moving { 
            border-left-color: var(--moving); 
            background: #064e3b; 
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.15);
        }

        /* SOS State (Emergency) */
        .card.SOS { 
            border-left-color: var(--sos); 
            background: #450a0a; 
            animation: pulse 1.5s infinite; 
        }

        .log-item { 
            font-family: 'Courier New', monospace;
            font-size: 0.8rem; 
            padding: 6px 0; 
            border-bottom: 1px solid #1e293b; 
            color: #94a3b8;
        }
        .log-item b { color: var(--accent); }

        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }

        .resolve-btn { 
            background: #22c55e; 
            color: white; 
            border: none; 
            width: 100%; 
            margin-top: 10px; 
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="dashboard-side">
        <div class="header-panel">
            <h1 style="margin:0; font-size: 1.4rem; color: var(--accent);">PAKISTAN MISSION COMMAND</h1>
            <div class="controls">
                <select id="filterSelect" onchange="fetchData()">
                    <option value="ALL">All Agencies</option>
                    <option value="WFP">WFP</option>
                    <option value="UNICEF">UNICEF</option>
                    <option value="UNDSS">UNDSS</option>
                </select>
                <button onclick="testSiren()">🔈 TEST ALARM</button>
            </div>
        </div>

        <div class="scroll-area">
            <div class="grid" id="mission-grid"></div>
        </div>

        <div class="log-section">
            <h4 style="margin:0 0 10px 0; color:var(--accent); font-size: 0.8rem; text-transform: uppercase;">Live Incident Feed</h4>
            <div id="log-container"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Start Map View on Pakistan [Lat, Lng], Zoom level 5
        const map = L.map('map').setView([30.3753, 69.3451], 5);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = {};
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isAlarmActive = false;
        let alarmInterval = null;

        function beep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(isAlarmActive ? 900 : 600, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); 
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        async function fetchData() {
            try {
                const [mRes, lRes] = await Promise.all([
                    fetch('http://127.0.0.1:5000/api/missions/'),
                    fetch('http://127.0.0.1:5000/api/missions/logs')
                ]);
                
                let missions = await mRes.json();
                const logs = await lRes.json();
                const filter = document.getElementById('filterSelect').value;

                if (filter !== 'ALL') missions = missions.filter(m => m.agency === filter);
                
                renderMissions(missions);
                updateMap(missions);
                renderLogs(logs);
            } catch (err) { 
                console.error("Fetch Error: Ensure Flask is running on port 5000."); 
            }
        }

        function updateMap(missions) {
            missions.forEach(m => {
                // Check if coordinates exist
                if (m.lat && m.lng) {
                    if (!markers[m.callsign]) {
                        // Create marker if it doesn't exist
                        markers[m.callsign] = L.marker([m.lat, m.lng]).addTo(map);
                    } else {
                        // Update existing marker position
                        markers[m.callsign].setLatLng([m.lat, m.lng]);
                    }
                    
                    markers[m.callsign].bindPopup(`<b>${m.callsign}</b><br>Status: ${m.status}`);
                    
                    if (m.status === 'SOS') {
                        markers[m.callsign]._icon.style.filter = "hue-rotate(150deg) brightness(1.2) saturate(3)";
                        map.flyTo([m.lat, m.lng], 12); 
                    } else {
                        markers[m.callsign]._icon.style.filter = "none";
                    }
                }
            });
        }

        function renderMissions(data) {
            const grid = document.getElementById('mission-grid');
            let sosCount = 0;
            grid.innerHTML = data.map(m => {
                let cardClass = m.status;
                
                // Card Color Logic: 
                // If Active AND has coordinates (not 0), turn GREEN
                if (m.status === 'Active' && m.lat !== 0) {
                    cardClass = 'Moving';
                }

                if (m.status === 'SOS') sosCount++;

                return `
                    <div class="card ${cardClass}">
                        <small style="color:var(--accent)">${m.agency}</small>
                        <h3 style="margin:5px 0">${m.callsign}</h3>
                        <div style="font-size:0.7rem; opacity: 0.8;">
                            LOC: ${m.lat.toFixed(4)}, ${m.lng.toFixed(4)}
                        </div>
                        ${m.status === 'SOS' ? 
                            `<button class="resolve-btn" onclick="resolveMission('${m.callsign}')">MARK SAFE</button>` : 
                            `<div style="margin-top:10px; font-size:0.65rem; font-weight:bold;">● ${cardClass.toUpperCase()}</div>`}
                    </div>
                `;
            }).join('');
            toggleAlarm(sosCount > 0);
        }

        function renderLogs(logs) {
            document.getElementById('log-container').innerHTML = logs.map(l => `
                <div class="log-item"><span>[${l.time}]</span> <b>${l.callsign}</b>: ${l.event}</div>
            `).join('');
        }

        function toggleAlarm(active) {
            if (active && !isAlarmActive) {
                isAlarmActive = true;
                alarmInterval = setInterval(beep, 1000);
            } else if (!active && isAlarmActive) {
                isAlarmActive = false;
                clearInterval(alarmInterval);
            }
        }

        async function resolveMission(callsign) {
            await fetch('http://127.0.0.1:5000/api/missions/resolve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ callsign: callsign })
            });
            fetchData();
        }

        function testSiren() { 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
            beep(); 
        }

        setInterval(fetchData, 3000);
        fetchData();
    </script>
</body>
</html>
